<!-- ================== DASHBOARD VIEW ================== -->
<div id="view-dashboard" class="view-section block animate-in fade-in duration-500">
    <!-- Stats Row (Bento Grid Style) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
        <!-- Stat 1 -->
        <div
            class="glass-panel p-8 rounded-[2rem] flex items-center gap-6 group hover:border-blue-500/30 transition-all hover:scale-[1.02] relative overflow-hidden">
            <div
                class="absolute -right-8 -bottom-8 w-24 h-24 bg-blue-600/5 rounded-full blur-2xl group-hover:bg-blue-600/10 transition-all">
            </div>
            <div
                class="w-16 h-16 rounded-2xl bg-blue-900/30 border border-blue-500/20 flex items-center justify-center text-blue-400 group-hover:bg-blue-600 group-hover:text-white transition-all">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                    </path>
                </svg>
            </div>
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase tracking-[0.2em] mb-1 font-fira">
                    Total Files</p>
                <h4 class="text-4xl font-bold text-white font-space" id="statTotalFiles">12</h4>
            </div>
        </div>
        <!-- Stat 2 -->
        <div
            class="glass-panel p-8 rounded-[2rem] flex items-center gap-6 group hover:border-indigo-500/30 transition-all hover:scale-[1.02] relative overflow-hidden">
            <div
                class="absolute -right-8 -bottom-8 w-24 h-24 bg-indigo-600/5 rounded-full blur-2xl group-hover:bg-indigo-600/10 transition-all">
            </div>
            <div
                class="w-16 h-16 rounded-2xl bg-indigo-900/30 border border-indigo-500/20 flex items-center justify-center text-indigo-400 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4">
                    </path>
                </svg>
            </div>
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase tracking-[0.2em] mb-1 font-fira">
                    Storage Used</p>
                <h4 class="text-4xl font-bold text-white font-space"><span id="statStorageUsed">3.5</span> <span
                        class="text-lg text-gray-600 font-normal">/ 10 GB</span></h4>
            </div>
        </div>
        <!-- Stat 3 -->
        <div
            class="glass-panel p-8 rounded-[2rem] flex items-center gap-6 group hover:border-purple-500/30 transition-all hover:scale-[1.02] relative overflow-hidden">
            <div
                class="absolute -right-8 -bottom-8 w-24 h-24 bg-purple-600/5 rounded-full blur-2xl group-hover:bg-purple-600/10 transition-all">
            </div>
            <div
                class="w-16 h-16 rounded-2xl bg-purple-900/30 border border-purple-500/20 flex items-center justify-center text-purple-400 group-hover:bg-purple-600 group-hover:text-white transition-all">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1">
                    </path>
                </svg>
            </div>
            <div>
                <p class="text-xs text-gray-500 font-bold uppercase tracking-[0.2em] mb-1 font-fira">
                    Active Links</p>
                <h4 class="text-4xl font-bold text-white font-space" id="statActiveLinks">5</h4>
            </div>
        </div>
    </div>

    <div class="glass-panel cyber-border p-12 rounded-[2.5rem] text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-600/5 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-indigo-600/5 rounded-full blur-[120px]"></div>

        <div
            class="w-24 h-24 rounded-3xl bg-blue-600/10 border border-blue-500/20 flex items-center justify-center text-blue-400 mx-auto mb-8 shadow-[0_0_30px_rgba(59,130,246,0.2)] animate-float">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                </path>
            </svg>
        </div>
        <h3 class="text-3xl font-bold text-white mb-4 font-space">Welcome to Your Secure Vault</h3>
        <p class="text-gray-400 max-w-xl mx-auto mb-10 text-lg leading-relaxed">Your files are shielded
            with military-grade encryption. All assets are safely stored in your private, encrypted
            space.</p>
        <div class="flex gap-6 justify-center">
            <button onclick="document.querySelector('[data-target=\'view-upload-file\']').click()"
                class="cyber-btn px-10 py-4 rounded-2xl text-white font-bold text-lg">Encrypt & Upload
                File</button>
            <button onclick="document.querySelector('[data-target=\'view-my-files\']').click()"
                class="cyber-btn-outline px-10 py-4 rounded-2xl font-bold text-lg">Browse
                Assets</button>
        </div>
    </div>
</div>
