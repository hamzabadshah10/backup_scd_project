<!-- ================== SETTINGS VIEW ================== -->
<div id="view-settings" class="view-section animate-in slide-in-from-right-8 duration-500 h-full">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-10">

        <div class="md:col-span-4 space-y-6">
            <div
                class="glass-panel cyber-border rounded-[2rem] p-10 flex flex-col items-center text-center relative overflow-hidden">
                <div
                    class="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-blue-600/10 to-transparent">
                </div>
                <div
                    class="w-28 h-28 rounded-full bg-blue-600 flex items-center justify-center text-4xl font-bold text-white mb-6 border-4 border-slate-900 shadow-2xl neon-glow-blue relative z-10">
                    U
                </div>
                <h3 class="text-2xl font-bold text-white font-space relative z-10"
                    id="settingsUsername">User</h3>
                <div
                    class="px-4 py-1.5 rounded-full bg-blue-900/30 border border-blue-500/20 text-blue-400 text-[10px] font-bold font-fira uppercase tracking-widest mt-3 relative z-10">
                    Cyber Sentinel Level 1</div>

                <div class="w-full mt-10 space-y-4 relative z-10">
                    <div
                        class="flex justify-between text-xs text-gray-500 border-b border-white/5 pb-3">
                        <span>Account Type</span>
                        <span class="text-gray-200">Personal Vault</span>
                    </div>
                    <div
                        class="flex justify-between text-xs text-gray-500 border-b border-white/5 pb-3">
                        <span>Security Protocol</span>
                        <span class="text-blue-400">AES-256 GCM</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:col-span-8 space-y-8">
            <div class="glass-panel cyber-border rounded-[2rem] p-10">
                <h3
                    class="text-xl font-bold text-white mb-8 flex items-center gap-3 border-b border-white/5 pb-6 font-space">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                    Security Configurations
                </h3>

                <form id="settingsForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="md:col-span-2">
                        <label
                            class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 font-fira">Current
                            Password</label>
                        <input type="password" id="currentPassword" required
                            class="w-full bg-slate-900/50 border border-white/5 rounded-2xl px-6 py-4 text-white focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 transition-all"
                            placeholder="Enter current password">
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 font-fira">New
                            Password</label>
                        <input type="password" id="newPassword" required minlength="6"
                            class="w-full bg-slate-900/50 border border-white/5 rounded-2xl px-6 py-4 text-white focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 transition-all"
                            placeholder="Minimum 6 characters">
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 font-fira">Confirm
                            Password</label>
                        <input type="password" id="confirmPassword" required minlength="6"
                            class="w-full bg-slate-900/50 border border-white/5 rounded-2xl px-6 py-4 text-white focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 transition-all"
                            placeholder="Re-enter new password">
                    </div>
                    <div class="md:col-span-2 pt-6 border-t border-white/5 mt-4">
                        <button type="submit" id="settingsSubmitBtn"
                            class="cyber-btn px-10 py-4 rounded-2xl text-white font-bold text-lg">Change
                            Password</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
