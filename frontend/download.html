<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault | Access Encrypted Asset</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/app.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        space: ['Space Grotesk', 'sans-serif'],
                        fira: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-[#020617] text-gray-100 font-inter antialiased min-h-screen relative overflow-x-hidden flex items-center justify-center selection:bg-blue-500/30 selection:text-blue-200">

    <!-- Background Effects -->
    <div class="fixed inset-0 cyber-grid opacity-40 pointer-events-none z-0"></div>
    <div class="glow-orb glow-orb-blue top-[-100px] left-[-100px] opacity-30"></div>
    <div class="glow-orb glow-orb-purple bottom-[-100px] right-[-100px] opacity-20"></div>

    <!-- Main Content -->
    <main class="relative z-10 w-full max-w-lg px-6 py-12">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-600/10 border border-blue-500/20 text-blue-400 mb-8 shadow-[0_0_30px_rgba(59,130,246,0.2)] animate-float">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white font-space">Access Encrypted Asset</h1>
            <p class="text-gray-500 mt-2">Enter the required credentials to decrypt and download.</p>
        </div>

        <div id="alertBox" class="hidden mb-8 p-5 rounded-2xl text-sm border font-fira relative z-10 backdrop-blur-md">
        </div>

        <div class="glass-panel cyber-border p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <!-- Atmospheric inner glow -->
            <div class="absolute -top-32 -right-32 w-64 h-64 bg-blue-600/5 rounded-full blur-[80px]"></div>

            <div id="fileInfo"
                class="hidden mb-10 p-6 rounded-2xl bg-slate-900/40 border border-white/5 flex items-center gap-6 group transition-all hover:border-blue-500/20">
                <div
                    class="w-16 h-16 rounded-2xl bg-blue-600/10 border border-blue-500/20 flex items-center justify-center text-blue-400 neon-glow-blue group-hover:scale-105 transition-transform">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                </div>
                <div class="overflow-hidden">
                    <h3 class="text-lg font-bold text-white font-space truncate" id="fileName">Loading asset info...
                    </h3>
                    <div class="flex items-center gap-3 mt-1.5">
                        <span class="text-xs text-gray-500 font-fira" id="fileSize">-- MB</span>
                        <span class="w-1 h-1 rounded-full bg-gray-700"></span>
                        <span
                            class="text-[10px] text-blue-400 font-bold uppercase tracking-widest font-fira">Encrypted</span>
                    </div>
                </div>
            </div>

            <form id="downloadForm" class="space-y-8 relative z-10">
                <div id="passwordField" class="hidden space-y-4">
                    <label class="block text-xs font-bold text-blue-400 uppercase tracking-[0.2em] font-fira">Access Key
                        Required</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                </path>
                            </svg>
                        </div>
                        <input type="password" id="accessPassword" placeholder="Enter password to decrypt"
                            class="w-full bg-slate-900/60 border border-blue-500/30 rounded-2xl pl-12 pr-4 py-4 text-white focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500/20 transition-all font-inter placeholder:text-gray-600 shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
                    </div>
                </div>

                <button type="submit" id="downloadBtn"
                    class="w-full cyber-btn text-white font-bold py-5 rounded-2xl transition-all duration-300 flex justify-center items-center gap-4 text-lg shadow-2xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    <span>Decrypt & Download</span>
                </button>
            </form>
        </div>

        <div class="mt-12 text-center">
            <p class="text-sm text-gray-600">Powered by <span
                    class="text-blue-500 font-bold font-space">SecureVault</span> Digital Fortification</p>
            <div class="mt-6 flex justify-center">
                <a href="login.html"
                    class="px-8 py-3 rounded-full border border-blue-400 bg-blue-500/20 text-white text-[11px] font-black uppercase tracking-[0.2em] hover:bg-blue-500/30 hover:scale-105 hover:shadow-[0_0_30px_rgba(59,130,246,0.3)] transition-all duration-300">
                    Main Interface
                </a>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/download.js"></script>
</body>

</html>
