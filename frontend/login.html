<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SecureVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/app.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        space: ['Space Grotesk', 'sans-serif'],
                        fira: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#020617] text-gray-100 font-inter antialiased min-h-screen relative overflow-x-hidden selection:bg-blue-500/30 selection:text-blue-200 flex items-center justify-center py-20">

    <!-- Background Effects -->
    <div class="fixed inset-0 cyber-grid opacity-40 pointer-events-none z-0"></div>
    <div class="glow-orb glow-orb-blue top-[-100px] left-[-100px] opacity-30"></div>
    <div class="glow-orb glow-orb-purple bottom-[-100px] right-[-100px] opacity-20"></div>

    <div class="relative z-10 w-full max-w-md px-6">
        <!-- Logo -->
        <div class="flex flex-col items-center gap-4 mb-12 group cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-16 h-16 rounded-2xl bg-blue-600/10 border border-blue-500/30 flex items-center justify-center neon-glow-blue transition-all group-hover:scale-110">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <div class="text-center">
                <h1 class="text-3xl font-bold tracking-tight text-white font-space">SecureVault</h1>
                <p class="text-[10px] uppercase tracking-[0.2em] text-blue-400 font-fira opacity-80">Core Encryption & Access</p>
            </div>
        </div>

        <div class="glass-panel cyber-border p-10 sm:p-12 rounded-[2.5rem] w-full relative overflow-hidden shadow-2xl">
            <!-- Atmospheric inner glow -->
            <div class="absolute -top-32 -right-32 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px]"></div>
            
            <div class="text-center mb-10 relative z-10">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-600/10 border border-blue-500/20 text-blue-400 mb-6 shadow-[0_0_30px_rgba(59,130,246,0.2)] animate-float">
                    <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                </div>
                <h3 class="text-3xl font-bold text-white mb-2 font-space">Welcome Back</h3>
                <p class="text-gray-500 text-sm">Enter your credentials to access the vault.</p>
            </div>

            <div id="alertBox" class="hidden mb-6 p-4 rounded-2xl text-sm border font-fira relative z-10 backdrop-blur-md"></div>

            <form id="loginForm" class="space-y-6 relative z-10">
                <div class="space-y-1">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-blue-400 transition-colors">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                        <input type="text" id="loginUsername" required placeholder="Username" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl pl-12 pr-4 py-4 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-inter">
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-blue-400 transition-colors">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input type="password" id="loginPassword" required placeholder="Password" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl pl-12 pr-12 py-4 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-inter">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-blue-400 transition-colors focus:outline-none toggle-password" data-target="loginPassword">
                            <svg class="h-5 w-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center pt-1">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <div class="relative w-5 h-5 rounded-lg border border-gray-600 bg-gray-800 flex items-center justify-center group-hover:border-blue-400 transition-colors shadow-inner">
                            <input type="checkbox" id="rememberMe" class="peer absolute opacity-0 cursor-pointer w-full h-full">
                            <svg class="w-3.5 h-3.5 text-white hidden peer-checked:block pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            <div class="absolute inset-0 bg-blue-600 rounded-lg opacity-0 peer-checked:opacity-100 transition-opacity -z-10 shadow-[0_0_10px_rgba(37,99,235,0.5)]"></div>
                        </div>
                        <span class="text-sm text-gray-400 group-hover:text-gray-300 transition-colors">Remember Me</span>
                    </label>
                </div>

                <button type="submit" class="w-full cyber-btn text-white font-bold py-4 rounded-2xl transition-all duration-300 mt-4 flex justify-center items-center gap-3 text-lg">
                    <span>Log In</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
                
                <p class="text-center text-sm text-gray-500 pt-6">
                    Don't have an account? <a href="register.html" class="text-blue-400 hover:text-blue-300 font-bold transition-colors">Create an Account ></a>
                </p>
            </form>
        </div>
        
        <p class="text-center mt-12 text-gray-600 text-xs font-fira tracking-widest uppercase">
            &copy; 2026 SecureVault. All Rights Reserved.
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Form Submission logic specific to this page
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Authenticating...`;
            
            try {
                const res = await fetchAPI('/api/auth/login', 'POST', {
                    username: document.getElementById('loginUsername').value, 
                    password: document.getElementById('loginPassword').value
                });
                if(res.error) throw new Error(res.error);
                
                // Handle Remember Me
                if (document.getElementById('rememberMe') && document.getElementById('rememberMe').checked) {
                    localStorage.setItem('secureFile_username', document.getElementById('loginUsername').value);
                } else {
                    localStorage.removeItem('secureFile_username');
                }

                window.location.href = 'home.html';
            } catch (err) {
                showAlert(err.message, 'error');
                btn.innerHTML = `<span>Log In</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>`;
            }
        });

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const icon = btn.querySelector('.eye-icon');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
                } else {
                    input.type = 'password';
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
                }
            });
        });
    </script>
</body>

</html>
