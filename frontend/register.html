<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SecureVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/app.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        space: ['Space Grotesk', 'sans-serif'],
                        fira: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#020617] text-gray-100 font-inter antialiased min-h-screen relative overflow-x-hidden selection:bg-blue-500/30 selection:text-blue-200 flex items-center justify-center py-20">

    <!-- Background Effects -->
    <div class="fixed inset-0 cyber-grid opacity-40 pointer-events-none z-0"></div>
    <div class="glow-orb glow-orb-blue top-[-100px] left-[-100px] opacity-30"></div>
    <div class="glow-orb glow-orb-purple bottom-[-100px] right-[-100px] opacity-20"></div>

    <div class="relative z-10 w-full max-w-md px-6">
        <!-- Logo -->
        <div class="flex flex-col items-center gap-4 mb-12 group cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-16 h-16 rounded-2xl bg-blue-600/10 border border-blue-500/30 flex items-center justify-center neon-glow-blue transition-all group-hover:scale-110">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <div class="text-center">
                <h1 class="text-3xl font-bold tracking-tight text-white font-space">SecureVault</h1>
                <p class="text-[10px] uppercase tracking-[0.2em] text-blue-400 font-fira opacity-80">Core Encryption & Access</p>
            </div>
        </div>

        <div class="glass-panel cyber-border p-10 sm:p-12 rounded-[2.5rem] w-full relative overflow-hidden shadow-2xl">
            <!-- Atmospheric inner glow -->
            <div class="absolute -top-32 -right-32 w-64 h-64 bg-indigo-600/10 rounded-full blur-[100px]"></div>
            
            <div class="text-center mb-10 relative z-10">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-indigo-600/10 border border-indigo-500/20 text-indigo-400 mb-6 shadow-[0_0_30px_rgba(79,70,229,0.2)] animate-float">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                    </svg>
                </div>
                <h3 class="text-3xl font-bold text-white mb-2 font-space">Create an Account</h3>
                <p class="text-gray-500 text-sm">Join the vault and secure your digital assets.</p>
            </div>

            <div id="alertBox" class="hidden mb-6 p-4 rounded-2xl text-sm border font-fira relative z-10 backdrop-blur-md"></div>

            <form id="registerForm" class="space-y-6 relative z-10">
                <div class="space-y-1">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="text" id="regUsername" required placeholder="Choose Username" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl pl-12 pr-4 py-4 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all font-inter">
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input type="password" id="regPassword" required placeholder="Secure Password" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl pl-12 pr-12 py-4 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all font-inter">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-indigo-400 transition-colors focus:outline-none toggle-password" data-target="regPassword">
                            <svg class="h-5 w-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 shadow-[0_0_20px_rgba(79,70,229,0.3)] hover:shadow-[0_0_40px_rgba(79,70,229,0.6)] text-white font-bold py-4 rounded-2xl transition-all duration-300 mt-4 flex justify-center items-center gap-3 text-lg">
                    <span>Register Account</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                </button>
                
                <p class="text-center text-sm text-gray-500 pt-6">
                    Already have an account? <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors">Log In ></a>
                </p>
            </form>
        </div>
        
        <p class="text-center mt-12 text-gray-600 text-xs font-fira tracking-widest uppercase">
            &copy; 2026 SecureVault. All Rights Reserved.
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Form Submission logic specific to this page
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Registering...`;
            
            try {
                const res = await fetchAPI('/api/auth/register', 'POST', {
                    username: document.getElementById('regUsername').value, 
                    password: document.getElementById('regPassword').value
                });
                if(res.error) throw new Error(res.error);
                showAlert('Registration successful. Please log in.', 'success');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (err) {
                showAlert(err.message, 'error');
                btn.innerHTML = `<span>Register Account</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>`;
            }
        });

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const icon = btn.querySelector('.eye-icon');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
                } else {
                    input.type = 'password';
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
                }
            });
        });
    </script>
</body>

</html>
